<!DOCTYPE html>

    :root {
      --bg: #0a0a0f; --card-bg: #14141f; --accent: #f5c518;
      --text-primary: #fff; --text-secondary: #8888aa; --border: #1e1e2e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', system-ui, sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }
    .container { max-width: 480px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; }
    .header { padding: 20px 0 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .back-link { color: var(--text-secondary); text-decoration: none; font-size: 14px; }
    .back-link:hover { color: var(--accent); }
    .header h1 { font-size: 18px; font-weight: 700; flex: 1; text-align: center; }
    .location-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--card-bg); border-radius: 12px; margin-bottom: 12px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); }
    .location-bar:hover { border-color: var(--accent); }
    .location-bar .loc-icon { font-size: 16px; }
    .location-bar .loc-text { flex: 1; color: var(--text-secondary); }
    .location-bar .loc-name { color: var(--accent); font-weight: 600; }
    .filter-section { padding: 10px 0; }
    .filter-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .filter-tabs { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tab { padding: 8px 16px; border-radius: 20px; font-size: 13px; white-space: nowrap; background: var(--card-bg); color: var(--text-secondary); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
    .filter-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
    .sub-filter-section { padding: 6px 0; margin-left: 16px; border-left: 2px solid var(--border); padding-left: 12px; }
    .sub-filter-tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
    .sub-filter-tab { padding: 6px 12px; border-radius: 16px; font-size: 12px; white-space: nowrap; background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
    .sub-filter-tab.active { background: rgba(245,197,24,0.2); color: var(--accent); border-color: var(--accent); }
    .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; }
    .month-nav-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-primary); width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; transition: all 0.2s; }
    .month-nav-btn:hover { background: var(--accent); color: #000; }
    .month-title { font-size: 18px; font-weight: 600; }
    .calendar { background: var(--card-bg); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
    .calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: all 0.2s; position: relative; min-height: 44px; }
    .calendar-day:hover { background: rgba(255,255,255,0.1); }
    .calendar-day.other-month { opacity: 0.3; }
    .calendar-day.today { background: rgba(245,197,24,0.2); border: 1px solid var(--accent); }
    .calendar-day.selected { background: var(--accent); }
    .calendar-day.selected .day-num { color: #000; }
    .day-num { font-size: 14px; font-weight: 500; }
    .event-bar { height: 3px; border-radius: 2px; position: absolute; bottom: 2px; }
    .event-bar.start { left: 20%; width: 80%; border-radius: 2px 0 0 2px; }
    .event-bar.middle { left: 0; width: 100%; }
    .event-bar.end { left: 0; width: 80%; border-radius: 0 2px 2px 0; }
    .event-dot { width: 4px; height: 4px; border-radius: 50%; position: absolute; bottom: 4px; }
    .event-section { flex: 1; padding-bottom: 20px; }
    .event-section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .event-list { display: flex; flex-direction: column; gap: 12px; }
    .event-card { background: var(--card-bg); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; animation: fadeIn 0.3s ease; }
    .event-card:hover { transform: translateX(4px); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .event-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .event-type { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .location-scope { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 8px; font-size: 11px; background: rgba(136,136,170,0.15); color: var(--text-secondary); }
    .event-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
    .favorite-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px; transition: transform 0.2s; }
    .favorite-btn:hover { transform: scale(1.2); }
    .event-date { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
    .event-location { font-size: 13px; color: var(--text-secondary); }
    .no-events { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
    .no-events-icon { font-size: 48px; margin-bottom: 12px; }
    .legend { display: flex; flex-wrap: wrap; gap: 12px; padding: 12px 0; font-size: 12px; color: var(--text-secondary); }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-content { background: var(--card-bg); border-radius: 16px; padding: 24px; max-width: 90%; max-height: 80vh; overflow-y: auto; width: 400px; transform: scale(0.9); transition: transform 0.3s; }
    .modal-overlay.active .modal-content { transform: scale(1); }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .modal-title { font-size: 20px; font-weight: 700; flex: 1; }
    .modal-close { background: none; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; }
    .modal-body { font-size: 14px; line-height: 1.8; }
    .modal-body p { margin-bottom: 12px; }
    .modal-link { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); text-decoration: none; padding: 10px 16px; background: rgba(245,197,24,0.1); border-radius: 8px; margin-top: 16px; transition: all 0.2s; }
    .modal-link:hover { background: rgba(245,197,24,0.2); }
    .favorites-page { display: none; padding-bottom: 20px; }
    .favorites-page.active { display: block; }
    .favorites-header { display: flex; align-items: center; gap: 12px; padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .favorites-back { background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; }
    .favorites-title { font-size: 18px; font-weight: 600; }
    .favorites-count { background: var(--accent); color: #000; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    .fav-btn-full { width: 100%; padding: 12px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; color: var(--text-primary); font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .fav-btn-full:hover { border-color: var(--accent); color: var(--accent); }
    @media (max-width: 400px) { .container { padding: 0 12px; } .header h1 { font-size: 16px; } }
  </style>
</head>

    // 收藏
    let favorites = JSON.parse(localStorage.getItem('calendarFavorites') || '[]');
    function saveFavorites() { localStorage.setItem('calendarFavorites', JSON.stringify(favorites)); }
    function toggleFavorite(id, e) {
      e.stopPropagation();
      const idx = favorites.indexOf(id);
      if (idx > -1) favorites.splice(idx, 1); else favorites.push(id);
      saveFavorites();
      updateFavCount();
      renderEvents();
    }
    function isFavorite(id) { return favorites.indexOf(id) > -1; }
    function updateFavCount() {
      document.getElementById('favCount').textContent = favorites.length;
      document.getElementById('favPageCount').textContent = favorites.length;
    }

    // 状态
    let currentYear = 2026, currentMonth = 1, selectedDate = null;
    let currentCategory = 'all', currentType = 'all', currentScope = 'all';

    const today = new Date();
    if (today.getFullYear() === 2026) {
      currentYear = today.getFullYear();
      currentMonth = today.getMonth();
      selectedDate = today.getDate();
    }

    function formatDateKey(y, m, d) {
      return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }

    function eventMatchesFilters(event) {
      if (currentCategory !== 'all' && event.category !== currentCategory) return false;
      if (currentType !== 'all' && event.type !== currentType) return false;
      if (currentScope !== 'all' && event.locationScope !== currentScope) return false;
      return true;
    }

    function getEventsForDate(dateKey) {
      return events.filter(e => {
        if (!eventMatchesFilters(e)) return false;
        if (e.endDate) return dateKey >= e.date && dateKey <= e.endDate;
        return e.date === dateKey;
      });
    }

    function getEventBarsForDate(dateKey) {
      const bars = [];
      events.forEach(e => {
        if (!eventMatchesFilters(e)) return;
        const color = typeColors[e.type] || '#888';
        if (e.endDate && e.endDate !== e.date) {
          if (dateKey >= e.date && dateKey <= e.endDate) {
            const pos = dateKey === e.date ? 'start' : dateKey === e.endDate ? 'end' : 'middle';
            bars.push({ color, pos, multi: true });
          }
        } else if (e.date === dateKey) {
          bars.push({ color, pos: 'dot', multi: false });
        }
      });
      return bars.slice(0, 3);
    }

    function renderCalendar() {
      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
      const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      document.getElementById('monthTitle').textContent = `${currentYear}年${monthNames[currentMonth]}`;

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      for (let i = firstDay - 1; i >= 0; i--) {
        const el = document.createElement('div');
        el.className = 'calendar-day other-month';
        el.innerHTML = `<span class="day-num">${daysInPrevMonth - i}</span>`;
        grid.appendChild(el);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateKey = formatDateKey(currentYear, currentMonth, day);
        const bars = getEventBarsForDate(dateKey);
        const el = document.createElement('div');
        el.className = 'calendar-day';
        if (currentYear === today.getFullYear() && currentMonth === today.getMonth() && day === today.getDate()) el.classList.add('today');
        if (selectedDate === day) el.classList.add('selected');

        let barsHtml = '';
        const multiEvents = bars.filter(b => b.multi);
        const dotEvents = bars.filter(b => !b.multi);

        if (multiEvents.length > 0) {
          const b = multiEvents[0];
          barsHtml += `<div class="event-bar ${b.pos}" style="background:${b.color}"></div>`;
        } else if (dotEvents.length > 0) {
          const offset = dotEvents.length === 1 ? 50 : dotEvents.length === 2 ? 40 : 30;
          dotEvents.forEach((d, i) => {
            barsHtml += `<div class="event-dot" style="background:${d.color};left:${offset + i*12}%"></div>`;
          });
        }

        el.innerHTML = `<span class="day-num">${day}</span>${barsHtml}`;
        el.addEventListener('click', () => { selectedDate = day; renderCalendar(); renderEvents(); });
        grid.appendChild(el);
      }

      const totalCells = firstDay + daysInMonth;
      const remaining = totalCells > 35 ? 42 - totalCells : 35 - totalCells;
      for (let day = 1; day <= remaining; day++) {
        const el = document.createElement('div');
        el.className = 'calendar-day other-month';
        el.innerHTML = `<span class="day-num">${day}</span>`;
        grid.appendChild(el);
      }
    }

    function renderEventCard(event, index) {
      const color = typeColors[event.type] || '#888';
      const label = typeLabels[event.type] || event.type;
      const scope = scopeLabels[event.locationScope] || '';
      let dateDisplay = event.date;
      if (event.endDate && event.endDate !== event.date) dateDisplay = `${event.date} ~ ${event.endDate}`;
      const fav = isFavorite(event.id);
      return `
        <div class="event-card" style="animation-delay:${index*0.05}s;border-left:3px solid ${color}" onclick="openModal(${event.id})">
          <div class="event-tags">
            <div class="event-type" style="background:${color}22;color:${color}">${label}</div>
            <div class="location-scope">${scope}</div>
          </div>
          <div class="event-title">
            ${event.title}
            <button class="favorite-btn" onclick="toggleFavorite(${event.id},event)">${fav ? '❤️' : '🤍'}</button>
          </div>
          <div class="event-date">📅 ${dateDisplay}</div>
          <div class="event-location">📍 ${event.location}</div>
        </div>`;
    }

    function renderEvents() {
      updateFavCount();
      if (!selectedDate) {
        document.getElementById('eventList').innerHTML = '<div class="no-events"><div class="no-events-icon">📅</div><p>点击日历中的日期查看事件</p></div>';
        document.getElementById('eventSectionTitle').textContent = '事件列表';
        return;
      }
      const dateKey = formatDateKey(currentYear, currentMonth, selectedDate);
      const eventsForDay = getEventsForDate(dateKey);
      const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      document.getElementById('eventSectionTitle').textContent = `${currentYear}年${monthNames[currentMonth]}${selectedDate}日`;
      if (eventsForDay.length === 0) {
        document.getElementById('eventList').innerHTML = '<div class="no-events"><div class="no-events-icon">🎉</div><p>这一天没有重大事件</p></div>';
        return;
      }
      document.getElementById('eventList').innerHTML = eventsForDay.map((e, i) => renderEventCard(e, i)).join('');
    }

    function openModal(id) {
      const event = events.find(e => e.id === id);
      if (!event) return;
      const color = typeColors[event.type] || '#888';
      const label = typeLabels[event.type] || event.type;
      const scope = scopeLabels[event.locationScope] || '';
      let dateDisplay = event.date;
      if (event.endDate && event.endDate !== event.date) dateDisplay = `${event.date} ~ ${event.endDate}`;
      document.getElementById('modalTitle').textContent = event.title;
      document.getElementById('modalBody').innerHTML = `
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
          <span style="background:${color}22;color:${color};padding:4px 10px;border-radius:12px;font-size:12px">${label}</span>
          <span style="background:rgba(136,136,170,0.15);color:#8888aa;padding:4px 8px;border-radius:8px;font-size:11px">${scope}</span>
        </div>
        <p>📅 <strong>时间：</strong>${dateDisplay}</p>
        <p>📍 <strong>地点：</strong>${event.location}</p>
        ${event.description ? `<p>📝 <strong>简介：</strong>${event.description}</p>` : ''}
        ${event.link ? `<a href="${event.link}" target="_blank" class="modal-link">🔗 查看详情 / 官方链接 →</a>` : ''}
      `;
      document.getElementById('eventModal').classList.add('active');
    }

    function closeModal() { document.getElementById('eventModal').classList.remove('active'); }

    function showFavoritesPage() {
      document.getElementById('mainPage').style.display = 'none';
      document.getElementById('favoritesPage').classList.add('active');
      const favEvents = events.filter(e => isFavorite(e.id)).sort((a, b) => a.date.localeCompare(b.date));
      document.getElementById('favPageCount').textContent = favEvents.length;
      if (favEvents.length === 0) {
        document.getElementById('favoritesList').innerHTML = '<div class="no-events"><div class="no-events-icon">❤️</div><p>还没有收藏的事件</p></div>';
        return;
      }
      document.getElementById('favoritesList').innerHTML = favEvents.map((e, i) => renderEventCard(e, i)).join('');
    }

    function hideFavoritesPage() {
      document.getElementById('mainPage').style.display = '';
      document.getElementById('favoritesPage').classList.remove('active');
    }

    // 一级分类切换
    document.querySelectorAll('[data-category]').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('[data-category]').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentCategory = tab.dataset.category;
        currentType = 'all';
        updateSubFilters();
        renderCalendar();
        renderEvents();
      });
    });

    // 二级分类
    function updateSubFilters() {
      const container = document.getElementById('subFilterTabs');
      const types = currentCategory === 'all' ? [] : (categoryTypes[currentCategory] || []);
      let html = '<div class="sub-filter-tab active" data-type="all">全部</div>';
      types.forEach(t => {
        html += `<div class="sub-filter-tab" data-type="${t}">${typeLabels[t] || t}</div>`;
      });
      container.innerHTML = html;
      container.querySelectorAll('[data-type]').forEach(tab => {
        tab.addEventListener('click', () => {
          container.querySelectorAll('[data-type]').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentType = tab.dataset.type;
          renderCalendar();
          renderEvents();
        });
      });
    }

    // 地理范围
    document.querySelectorAll('[data-scope]').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('[data-scope]').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentScope = tab.dataset.scope;
        renderCalendar();
        renderEvents();
      });
    });

    // 月份导航
    document.getElementById('prevMonth').addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderCalendar(); renderEvents();
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      renderCalendar(); renderEvents();
    });

    // 点击弹窗外关闭
    document.getElementById('eventModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // 初始化
    updateSubFilters();
    renderCalendar();
    renderEvents();
  </script>
</body>
</html>
