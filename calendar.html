<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>全球大事件日历 - 杭州</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --card-bg: #14141f;
      --accent: #f5c518;
      --sports: #3b82f6;
      --festival-china: #ef4444;
      --global: #f5c518;
      --concert: #a855f7;
      --tech: #22c55e;
      --text-primary: #ffffff;
      --text-secondary: #8888aa;
      --border: #1e1e2e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 20px 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .back-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      flex: 1;
      text-align: center;
    }

    /* Filter Section */
    .filter-section {
      padding: 12px 0;
    }

    .filter-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .filter-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .filter-tabs::-webkit-scrollbar {
      display: none;
    }

    .filter-tab {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text-secondary);
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .filter-tab.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 500;
    }

    .filter-tab:hover:not(.active) {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .filter-tabs-location .filter-tab {
      font-size: 12px;
      padding: 6px 12px;
    }

    /* Month Navigator */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      gap: 12px;
    }

    .month-nav-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .month-nav-btn:hover {
      background: var(--border);
      border-color: var(--accent);
    }

    .month-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    /* Calendar Grid */
    .calendar {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .calendar-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 8px;
    }

    .calendar-header span {
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      min-height: 44px;
    }

    .calendar-day:hover {
      background: var(--border);
    }

    .calendar-day.other-month {
      opacity: 0.3;
    }

    .calendar-day.today {
      border: 2px solid var(--accent);
    }

    .calendar-day.selected {
      background: var(--accent);
    }

    .calendar-day.selected .day-num {
      color: var(--bg);
    }

    .day-num {
      font-size: 14px;
      font-weight: 500;
    }

    .day-events {
      display: flex;
      gap: 2px;
      margin-top: 2px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .event-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .event-dot.sports { background: var(--sports); }
    .event-dot.festival-china { background: var(--festival-china); }
    .event-dot.global { background: var(--global); }
    .event-dot.concert { background: var(--concert); }
    .event-dot.tech { background: var(--tech); }

    /* Event List */
    .event-section {
      flex: 1;
      padding-bottom: 20px;
    }

    .event-section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-secondary);
    }

    .event-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .event-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      animation: slideIn 0.3s ease-out;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .event-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .event-type {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .event-type.sports { background: rgba(59, 130, 246, 0.2); color: var(--sports); }
    .event-type.festival-china { background: rgba(239, 68, 68, 0.2); color: var(--festival-china); }
    .event-type.global { background: rgba(245, 197, 24, 0.2); color: var(--global); }
    .event-type.concert { background: rgba(168, 85, 247, 0.2); color: var(--concert); }
    .event-type.tech { background: rgba(34, 197, 94, 0.2); color: var(--tech); }

    .event-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .location-scope {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      background: rgba(136, 136, 170, 0.15);
      color: var(--text-secondary);
    }

    .location-scope.city { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
    .location-scope.province { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
    .location-scope.national { background: rgba(245, 197, 24, 0.15); color: #f5c518; }
    .location-scope.global { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }

    .event-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .event-date {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .event-location {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .event-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .no-events {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .no-events-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 12px 0;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* Responsive */
    @media (max-width: 400px) {
      .container {
        padding: 0 12px;
      }

      .header h1 {
        font-size: 16px;
      }

      .month-title {
        font-size: 18px;
      }
    }
  </style>
</head>

    let currentYear = 2026;
    let currentMonth = 1; // 0-indexed (0 = January)

    const calendarGrid = document.getElementById('calendarGrid');
    const monthTitle = document.getElementById('monthTitle');
    const eventList = document.getElementById('eventList');
    const eventSectionTitle = document.getElementById('eventSectionTitle');
    const prevMonthBtn = document.getElementById('prevMonth');
    const nextMonthBtn = document.getElementById('nextMonth');
    const filterTabs = document.querySelectorAll('.filter-tabs:first-of-type .filter-tab');
    const filterTabsLocation = document.querySelectorAll('.filter-tabs-location .filter-tab');

    // Get today's date
    const today = new Date();
    const currentYearToday = today.getFullYear();
    const currentMonthToday = today.getMonth();
    const currentDateToday = today.getDate();

    // Initialize with current month if 2026
    if (currentYearToday === 2026) {
      currentYear = currentYearToday;
      currentMonth = currentMonthToday;
      selectedDate = currentDateToday;
    }

    // Format date key
    function formatDateKey(year, month, day) {
      return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    }

    // Get events for a specific date
    function getEventsForDate(dateKey) {
      return events.filter(event => {
        // Filter by event type
        if (currentFilter !== 'all' && event.type !== currentFilter) return false;
        
        // Filter by location scope
        if (currentScope !== 'all' && event.locationScope !== currentScope) return false;
        
        // Check date range
        if (event.endDate) {
          return dateKey >= event.date && dateKey <= event.endDate;
        }
        return event.date === dateKey;
      });
    }

    // Get all event types for a date (for dots display)
    function getEventTypesForDate(dateKey) {
      const types = new Set();
      events.forEach(event => {
        // Apply same filters
        if (currentFilter !== 'all' && event.type !== currentFilter) return;
        if (currentScope !== 'all' && event.locationScope !== currentScope) return;
        
        if (event.endDate) {
          if (dateKey >= event.date && dateKey <= event.endDate) {
            types.add(event.type);
          }
        } else if (event.date === dateKey) {
          types.add(event.type);
        }
      });
      return Array.from(types).slice(0, 3);
    }

    // Render Calendar
    function renderCalendar() {
      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

      // Update month title
      const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
      monthTitle.textContent = `${currentYear}年${monthNames[currentMonth]}`;

      calendarGrid.innerHTML = '';

      // Previous month days
      for (let i = firstDay - 1; i >= 0; i--) {
        const day = daysInPrevMonth - i;
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day other-month';
        dayEl.innerHTML = `<span class="day-num">${day}</span>`;
        calendarGrid.appendChild(dayEl);
      }

      // Current month days
      for (let day = 1; day <= daysInMonth; day++) {
        const dateKey = formatDateKey(currentYear, currentMonth, day);
        const eventsForDay = getEventsForDate(dateKey);
        const eventTypes = getEventTypesForDate(dateKey);

        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day';

        // Check if today
        if (currentYear === currentYearToday && currentMonth === currentMonthToday && day === currentDateToday) {
          dayEl.classList.add('today');
        }

        // Check if selected
        if (selectedDate === day) {
          dayEl.classList.add('selected');
        }

        // Build event dots
        let dotsHtml = '';
        if (eventTypes.length > 0) {
          dotsHtml = `<div class="day-events">${eventTypes.map(type => `<div class="event-dot ${type}"></div>`).join('')}</div>`;
        }

        dayEl.innerHTML = `
          <span class="day-num">${day}</span>
          ${dotsHtml}
        `;

        dayEl.addEventListener('click', () => {
          selectedDate = day;
          renderCalendar();
          renderEvents();
        });

        calendarGrid.appendChild(dayEl);
      }

      // Next month days
      const totalCells = firstDay + daysInMonth;
      const remainingCells = totalCells > 35 ? 42 - totalCells : 35 - totalCells;
      for (let day = 1; day <= remainingCells; day++) {
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day other-month';
        dayEl.innerHTML = `<span class="day-num">${day}</span>`;
        calendarGrid.appendChild(dayEl);
      }
    }

    // Render Events
    function renderEvents() {
      if (!selectedDate) {
        eventList.innerHTML = '<div class="no-events"><div class="no-events-icon">📅</div><p>点击日历中的日期查看事件</p></div>';
        eventSectionTitle.textContent = '事件列表';
        return;
      }

      const dateKey = formatDateKey(currentYear, currentMonth, selectedDate);
      const eventsForDay = getEventsForDate(dateKey);

      const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
      eventSectionTitle.textContent = `${currentYear}年${monthNames[currentMonth]}${selectedDate}日`;

      if (eventsForDay.length === 0) {
        eventList.innerHTML = '<div class="no-events"><div class="no-events-icon">🎉</div><p>这一天没有重大事件</p></div>';
        return;
      }

      eventList.innerHTML = eventsForDay.map((event, index) => {
        const typeLabels = {
          'sports': '🏆 体育',
          'festival-china': '🎌 中国节日',
          'global': '🌍 全球节日',
          'concert': '🎵 演唱会/演出',
          'tech': '💻 科技/其他'
        };

        const scopeLabels = {
          'city': '🏙️ 杭州',
          'province': '🏯 浙江',
          'national': '🇨🇳 全国',
          'global': '🌐 全球'
        };

        let dateDisplay = event.date;
        if (event.endDate && event.endDate !== event.date) {
          dateDisplay = `${event.date} ~ ${event.endDate}`;
        }

        return `
          <div class="event-card" style="animation-delay: ${index * 0.05}s">
            <div class="event-tags">
              <div class="event-type ${event.type}">${typeLabels[event.type] || event.type}</div>
              <div class="location-scope ${event.locationScope}">${scopeLabels[event.locationScope] || ''}</div>
            </div>
            <div class="event-title">${event.title}</div>
            <div class="event-date">📅 ${dateDisplay}</div>
            <div class="event-location">📍 ${event.location}</div>
            ${event.description ? `<div class="event-desc">${event.description}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    // Event Listeners
    prevMonthBtn.addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      renderCalendar();
      renderEvents();
    });

    nextMonthBtn.addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      renderCalendar();
      renderEvents();
    });

    filterTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        filterTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        renderCalendar();
        renderEvents();
      });
    });

    // Location scope filter
    filterTabsLocation.forEach(tab => {
      tab.addEventListener('click', () => {
        filterTabsLocation.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentScope = tab.dataset.scope;
        renderCalendar();
        renderEvents();
      });
    });

    // Initial render
    renderCalendar();
    renderEvents();
  </script>
</body>
</html>
