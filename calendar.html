    :root {
      --bg: #0a0a0f;
      --card-bg: #14141f;
      --accent: #f5c518;
      --sports: #3b82f6;
      --festival-china: #ef4444;
      --global: #f5c518;
      --concert: #a855f7;
      --tech: #22c55e;
      --exam: #f97316;
      --protest: #ef4444;
      --folk: #14b8a6;
      --livehouse: #ec4899;
      --text-primary: #ffffff;
      --text-secondary: #8888aa;
      --border: #1e1e2e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 20px 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .back-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      flex: 1;
      text-align: center;
    }

    .filter-section { padding: 12px 0; }

    .filter-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .filter-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .filter-tabs::-webkit-scrollbar { display: none; }

    .filter-tab {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      white-space: nowrap;
      background: var(--card-bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tab.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .filter-tabs-location { margin-top: 8px; }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }

    .month-nav-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .month-nav-btn:hover { background: var(--accent); color: #000; }

    .month-title { font-size: 18px; font-weight: 600; }

    .calendar {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .calendar-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .calendar-day:hover { background: rgba(255,255,255,0.1); }

    .calendar-day.other-month { opacity: 0.3; }

    .calendar-day.today {
      background: rgba(245, 197, 24, 0.2);
      border: 1px solid var(--accent);
    }

    .calendar-day.selected {
      background: var(--accent);
    }

    .calendar-day.selected .day-num { color: #000; }

    .day-num { font-size: 14px; font-weight: 500; }

    .day-events {
      display: flex;
      gap: 2px;
      position: absolute;
      bottom: 4px;
    }

    .event-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
    }

    .event-dot.sports { background: var(--sports); }
    .event-dot.festival-china { background: var(--festival-china); }
    .event-dot.global { background: var(--global); }
    .event-dot.concert { background: var(--concert); }
    .event-dot.tech { background: var(--tech); }
    .event-dot.exam { background: var(--exam); }
    .event-dot.protest { background: var(--protest); }
    .event-dot.folk { background: var(--folk); }
    .event-dot.livehouse { background: var(--livehouse); }

    .event-section {
      flex: 1;
      padding-bottom: 20px;
    }

    .event-section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .event-list { display: flex; flex-direction: column; gap: 12px; }

    .event-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .event-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }

    .event-type {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .event-type.sports { background: rgba(59, 130, 246, 0.2); color: var(--sports); }
    .event-type.festival-china { background: rgba(239, 68, 68, 0.2); color: var(--festival-china); }
    .event-type.global { background: rgba(245, 197, 24, 0.2); color: var(--global); }
    .event-type.concert { background: rgba(168, 85, 247, 0.2); color: var(--concert); }
    .event-type.tech { background: rgba(34, 197, 94, 0.2); color: var(--tech); }
    .event-type.exam { background: rgba(249, 115, 22, 0.2); color: var(--exam); }
    .event-type.protest { background: rgba(239, 68, 68, 0.2); color: var(--protest); }
    .event-type.folk { background: rgba(20, 184, 166, 0.2); color: var(--folk); }
    .event-type.livehouse { background: rgba(236, 72, 153, 0.2); color: var(--livehouse); }

    .location-scope {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      background: rgba(136, 136, 170, 0.15);
      color: var(--text-secondary);
    }

    .location-scope.city { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
    .location-scope.province { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
    .location-scope.national { background: rgba(245, 197, 24, 0.15); color: #f5c518; }
    .location-scope.global { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }

    .event-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .favorite-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      transition: transform 0.2s;
    }

    .favorite-btn:hover { transform: scale(1.2); }
    .favorite-btn.active { color: #ef4444; }

    .event-date { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
    .event-location { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
    .event-desc { font-size: 13px; color: var(--text-secondary); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

    .no-events { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
    .no-events-icon { font-size: 48px; margin-bottom: 12px; }

    .legend { display: flex; flex-wrap: wrap; gap: 12px; padding: 12px 0; font-size: 12px; color: var(--text-secondary); }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    @media (max-width: 400px) {
      .container { padding: 0 12px; }
      .header h1 { font-size: 16px; }
      .month-title { font-size: 18px; }
    }

</head>

      { id: 122, date: "2026-09-15", title: "苹果秋季发布会", type: "tech", locationScope: "global", location: "线上", description: "iPhone发布会" },
      { id: 123, date: "2026-11-10", title: "双十一购物节", type: "tech", locationScope: "national", location: "中国", description: "电商平台年度大促" },
      { id: 124, date: "2026-12-12", title: "双十二购物节", type: "tech", locationScope: "national", location: "中国", description: "年末购物狂欢" },
      { id: 125, date: "2026-04-25", title: "中国航天日", type: "tech", locationScope: "national", location: "中国", description: "中国航天事业纪念日" },
      { id: 126, date: "2026-05-18", title: "国际博物馆日", type: "tech", locationScope: "global", location: "全球", description: "博物馆主题活动" }
    ];

    // ========== 收藏功能 ==========
    let favorites = JSON.parse(localStorage.getItem('calendarFavorites') || '[]');

    function saveFavorites() {
      localStorage.setItem('calendarFavorites', JSON.stringify(favorites));
    }

    function toggleFavorite(eventId) {
      const idx = favorites.indexOf(eventId);
      if (idx > -1) {
        favorites.splice(idx, 1);
      } else {
        favorites.push(eventId);
      }
      saveFavorites();
      renderEvents();
    }

    function isFavorite(eventId) {
      return favorites.indexOf(eventId) > -1;
    }

    // State
    let currentYear = 2026;
    let currentMonth = 1;
    let selectedDate = null;
    let currentFilter = 'all';
    let currentScope = 'all';
    let showFavoritesOnly = false;

    const calendarGrid = document.getElementById('calendarGrid');
    const monthTitle = document.getElementById('monthTitle');

    const eventList = document.getElementById('eventList');
    const eventSectionTitle = document.getElementById('eventSectionTitle');
    const prevMonthBtn = document.getElementById('prevMonth');
    const nextMonthBtn = document.getElementById('nextMonth');
    const filterTabs = document.querySelectorAll('.filter-tabs:first-of-type .filter-tab');
    const filterTabsLocation = document.querySelectorAll('.filter-tabs-location .filter-tab');
    const favoritesTab = document.getElementById('favoritesTab');

    const today = new Date();
    const currentYearToday = today.getFullYear();
    const currentMonthToday = today.getMonth();
    const currentDateToday = today.getDate();

    if (currentYearToday === 2026) {
      currentYear = currentYearToday;
      currentMonth = currentMonthToday;
      selectedDate = currentDateToday;
    }

    function formatDateKey(year, month, day) {
      return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    }

    function getEventsForDate(dateKey) {
      let filtered = events.filter(event => {
        if (showFavoritesOnly && !isFavorite(event.id)) return false;
        if (currentFilter !== 'all' && event.type !== currentFilter) return false;
        if (currentScope !== 'all' && event.locationScope !== currentScope) return false;
        
        if (event.endDate) {
          return dateKey >= event.date && dateKey <= event.endDate;
        }
        return event.date === dateKey;
      });
      
      if (showFavoritesOnly) {
        filtered = filtered.filter(e => isFavorite(e.id));
      }
      return filtered;
    }

    function getEventTypesForDate(dateKey) {
      const types = new Set();
      events.forEach(event => {
        if (currentFilter !== 'all' && event.type !== currentFilter) return;
        if (currentScope !== 'all' && event.locationScope !== currentScope) return;
        if (showFavoritesOnly && !isFavorite(event.id)) return;
        
        if (event.endDate) {
          if (dateKey >= event.date && dateKey <= event.endDate) {
            types.add(event.type);
          }
        } else if (event.date === dateKey) {
          types.add(event.type);
        }
      });
      return Array.from(types).slice(0, 3);
    }

    function renderCalendar() {
      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

      const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
      monthTitle.textContent = `${currentYear}年${monthNames[currentMonth]}`;

      calendarGrid.innerHTML = '';

      for (let i = firstDay - 1; i >= 0; i--) {
        const day = daysInPrevMonth - i;
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day other-month';
        dayEl.innerHTML = `<span class="day-num">${day}</span>`;
        calendarGrid.appendChild(dayEl);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateKey = formatDateKey(currentYear, currentMonth, day);
        const eventsForDay = getEventsForDate(dateKey);
        const eventTypes = getEventTypesForDate(dateKey);

        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day';

        if (currentYear === currentYearToday && currentMonth === currentMonthToday && day === currentDateToday) {
          dayEl.classList.add('today');
        }

        if (selectedDate === day) {
          dayEl.classList.add('selected');
        }

        let dotsHtml = '';
        if (eventTypes.length > 0) {
          dotsHtml = `<div class="day-events">${eventTypes.map(type => `<div class="event-dot ${type}"></div>`).join('')}</div>`;
        }

        dayEl.innerHTML = `
          <span class="day-num">${day}</span>
          ${dotsHtml}
        `;

        dayEl.addEventListener('click', () => {
          selectedDate = day;
          renderCalendar();
          renderEvents();
        });

        calendarGrid.appendChild(dayEl);
      }

      const totalCells = firstDay + daysInMonth;
      const remainingCells = totalCells > 35 ? 42 - totalCells : 35 - totalCells;
      for (let day = 1; day <= remainingCells; day++) {
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day other-month';
        dayEl.innerHTML = `<span class="day-num">${day}</span>`;
        calendarGrid.appendChild(dayEl);
      }
    }

    function renderEvents() {
      if (showFavoritesOnly) {
        eventList.innerHTML = '';
        const allFavorites = events.filter(e => isFavorite(e.id));
        
        if (allFavorites.length === 0) {
          eventList.innerHTML = '<div class="no-events"><div class="no-events-icon">❤️</div><p>还没有收藏的事件</p></div>';
          eventSectionTitle.textContent = '我的收藏';
          return;
        }
        
        eventSectionTitle.textContent = `❤️ 我的收藏 (${allFavorites.length}个)`;
        eventList.innerHTML = allFavorites.map((event, index) => renderEventCard(event, index)).join('');
        return;
      }

      if (!selectedDate) {
        eventList.innerHTML = '<div class="no-events"><div class="no-events-icon">📅</div><p>点击日历中的日期查看事件</p></div>';
        eventSectionTitle.textContent = '事件列表';
        return;
      }

      const dateKey = formatDateKey(currentYear, currentMonth, selectedDate);
      const eventsForDay = getEventsForDate(dateKey);

      const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
      eventSectionTitle.textContent = `${currentYear}年${monthNames[currentMonth]}${selectedDate}日`;

      if (eventsForDay.length === 0) {
        eventList.innerHTML = '<div class="no-events"><div class="no-events-icon">🎉</div><p>这一天没有重大事件</p></div>';
        return;
      }

      eventList.innerHTML = eventsForDay.map((event, index) => renderEventCard(event, index)).join('');
    }

    function renderEventCard(event, index) {
      const typeLabels = {
        'sports': '🏆 体育',
        'festival-china': '🎌 节日',
        'global': '🌍 全球',
        'concert': '🎵 演唱会/演出',
        'exam': '📝 考试',
        'livehouse': '🎸 Livehouse',
        'folk': '🎭 民间活动',
        'tech': '💻 科技'
      };

      const scopeLabels = {
        'city': '🏙️ 杭州',
        'province': '🏯 浙江',
        'national': '🇨🇳 全国',
        'global': '🌐 全球'
      };

      let dateDisplay = event.date;
      if (event.endDate && event.endDate !== event.date) {
        dateDisplay = `${event.date} ~ ${event.endDate}`;
      }

      const favClass = isFavorite(event.id) ? 'active' : '';

      return `
        <div class="event-card" style="animation-delay: ${index * 0.05}s">
          <div class="event-tags">
            <div class="event-type ${event.type}">${typeLabels[event.type] || event.type}</div>
            <div class="location-scope ${event.locationScope}">${scopeLabels[event.locationScope] || ''}</div>
          </div>
          <div class="event-title">
            ${event.title}
            <button class="favorite-btn ${favClass}" onclick="toggleFavorite(${event.id})">
              ${isFavorite(event.id) ? '❤️' : '🤍'}
            </button>
          </div>
          <div class="event-date">📅 ${dateDisplay}</div>
          <div class="event-location">📍 ${event.location}</div>
          ${event.description ? `<div class="event-desc">${event.description}</div>` : ''}
        </div>
      `;
    }

    prevMonthBtn.addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      renderCalendar();
      renderEvents();
    });

    nextMonthBtn.addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      renderCalendar();
      renderEvents();
    });

    filterTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        filterTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        if (tab.dataset.filter === 'favorites') {
          showFavoritesOnly = true;
          favoritesTab.classList.add('active');
        } else {
          showFavoritesOnly = false;
          favoritesTab.classList.remove('active');
          currentFilter = tab.dataset.filter;
        }
        renderCalendar();
        renderEvents();
      });
    });

    favoritesTab.addEventListener('click', () => {
      filterTabs.forEach(t => t.classList.remove('active'));
      favoritesTab.classList.add('active');
      showFavoritesOnly = true;
      renderCalendar();
      renderEvents();
    });

    filterTabsLocation.forEach(tab => {
      tab.addEventListener('click', () => {
        filterTabsLocation.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentScope = tab.dataset.scope;
        renderCalendar();
        renderEvents();
      });
    });

    renderCalendar();
    renderEvents();
  </script>
