<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>全球大事件日历</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f; --card-bg: #14141f; --accent: #f5c518;
      --text-primary: #fff; --text-secondary: #8888aa; --border: #1e1e2e;
      --light-bg: #f5f5fa; --light-card: #fff; --light-text: #1a1a2e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', system-ui, sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; transition: all 0.3s; }
    body.light { --bg: var(--light-bg); --card-bg: var(--light-card); --text-primary: var(--light-text); --border: #e0e0e8; }
    .container { max-width: 480px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; }
    .header { padding: 20px 0 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .back-link { color: var(--text-secondary); text-decoration: none; font-size: 14px; }
    .header h1 { font-size: 18px; font-weight: 700; flex: 1; text-align: center; }
    .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-primary); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 16px; transition: all 0.2s; }
    .theme-toggle:hover { background: var(--accent); color: #000; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-input { flex: 1; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text-primary); font-size: 14px; }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .quick-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .stat-card { background: var(--card-bg); border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border); }
    .stat-card:hover { border-color: var(--accent); }
    .stat-card.active { border-color: var(--accent); background: rgba(245,197,24,0.1); }
    .stat-num { font-size: 24px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .location-selector { display: flex; gap: 8px; margin-bottom: 12px; }
    .location-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text-primary); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; }
    .location-btn:hover { border-color: var(--accent); }
    .location-btn.active { border-color: var(--accent); background: rgba(245,197,24,0.1); color: var(--accent); }
    .view-switch { display: flex; gap: 4px; background: var(--card-bg); border-radius: 10px; padding: 4px; margin-bottom: 12px; }
    .view-btn { flex: 1; padding: 8px; text-align: center; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s; background: transparent; border: none; color: var(--text-secondary); }
    .view-btn.active { background: var(--accent); color: #000; }
    .filter-section { padding: 10px 0; }
    .filter-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .filter-tabs { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tab { padding: 8px 16px; border-radius: 20px; font-size: 13px; white-space: nowrap; background: var(--card-bg); color: var(--text-secondary); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
    .filter-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
    .sub-filter-section { padding: 6px 0; margin-left: 16px; border-left: 2px solid var(--border); padding-left: 12px; }
    .sub-filter-tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
    .sub-filter-tab { padding: 6px 12px; border-radius: 16px; font-size: 12px; white-space: nowrap; background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
    .sub-filter-tab.active { background: rgba(245,197,24,0.2); color: var(--accent); border-color: var(--accent); }
    .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; }
    .month-nav-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-primary); width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; transition: all 0.2s; }
    .month-nav-btn:hover { background: var(--accent); color: #000; }
    .month-title { font-size: 18px; font-weight: 600; }
    .calendar { background: var(--card-bg); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
    .calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: all 0.2s; position: relative; min-height: 44px; }
    .calendar-day:hover { background: rgba(255,255,255,0.1); }
    .calendar-day.other-month { opacity: 0.3; }
    .calendar-day.today { background: rgba(245,197,24,0.2); border: 1px solid var(--accent); }
    .calendar-day.selected { background: var(--accent); }
    .calendar-day.selected .day-num { color: #000; }
    .day-num { font-size: 14px; font-weight: 500; }
    .event-bar { height: 3px; border-radius: 2px; position: absolute; bottom: 2px; }
    .event-bar.start { left: 20%; width: 80%; border-radius: 2px 0 0 2px; }
    .event-bar.middle { left: 0; width: 100%; }
    .event-bar.end { left: 0; width: 80%; border-radius: 0 2px 2px 0; }
    .event-dot { width: 4px; height: 4px; border-radius: 50%; position: absolute; bottom: 4px; }
    .event-section { flex: 1; padding-bottom: 20px; }
    .event-section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    .event-list { display: flex; flex-direction: column; gap: 12px; }
    .event-card { background: var(--card-bg); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.3s; animation: fadeIn 0.3s ease; border-left: 3px solid transparent; overflow: hidden; }
    .event-card:hover { transform: translateX(4px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .event-image { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .event-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .event-type { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .location-scope { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 8px; font-size: 11px; background: rgba(136,136,170,0.15); color: var(--text-secondary); }
    .event-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
    .favorite-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px; transition: transform 0.2s; }
    .favorite-btn:hover { transform: scale(1.2); }
    .event-date { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
    .event-location { font-size: 13px; color: var(--text-secondary); }
    .countdown { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding: 8px 12px; background: rgba(245,197,24,0.1); border-radius: 8px; font-size: 12px; color: var(--accent); }
    .no-events { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
    .no-events-icon { font-size: 48px; margin-bottom: 12px; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-content { background: var(--card-bg); border-radius: 16px; padding: 0; max-width: 95%; max-height: 90vh; overflow-y: auto; width: 450px; transform: scale(0.9); transition: transform 0.3s; }
    .modal-overlay.active .modal-content { transform: scale(1); }
    .modal-header { padding: 20px 20px 0; display: flex; justify-content: space-between; align-items: flex-start; }
    .modal-title { font-size: 20px; font-weight: 700; flex: 1; padding-right: 20px; }
    .modal-close { background: var(--bg); border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .modal-media { width: 100%; height: 200px; object-fit: cover; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .modal-body { padding: 20px; font-size: 14px; line-height: 1.8; }
    .modal-body p { margin-bottom: 12px; }
    .modal-meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
    .meta-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
    .meta-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
    .meta-value { font-size: 13px; font-weight: 600; }
    .modal-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .modal-tag { padding: 4px 10px; border-radius: 12px; font-size: 12px; background: rgba(245,197,24,0.1); color: var(--accent); }
    .modal-link { display: flex; align-items: center; justify-content: center; gap: 8px; color: #000; text-decoration: none; padding: 14px 16px; border-radius: 10px; margin-top: 8px; font-weight: 600; font-size: 14px; transition: all 0.2s; }
    .modal-link.primary { background: var(--accent); }
    .modal-link.secondary { background: rgba(255,255,255,0.1); color: var(--text-primary); }
    .modal-link:hover { transform: translateY(-2px); opacity: 0.9; }
    .modal-actions { display: flex; gap: 8px; flex-direction: column; padding: 0 20px 20px; }
    .reminder-section { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 12px; padding: 16px; margin-top: 16px; }
    .reminder-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .reminder-options { display: flex; gap: 8px; flex-wrap: wrap; }
    .reminder-option { padding: 8px 14px; border-radius: 20px; font-size: 12px; background: rgba(255,255,255,0.2); cursor: pointer; transition: all 0.2s; }
    .reminder-option.selected { background: #fff; color: #f5576c; }
    .favorites-page, .search-page, .week-page, .upcoming-page, .city-select-page { display: none; padding-bottom: 20px; }
    .favorites-page.active, .search-page.active, .week-page.active, .upcoming-page.active, .city-select-page.active { display: block; }
    .page-header { display: flex; align-items: center; gap: 12px; padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .page-back { background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; }
    .page-title { font-size: 18px; font-weight: 600; }
    .page-count { background: var(--accent); color: #000; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    .city-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .city-item { padding: 12px; text-align: center; border-radius: 8px; background: var(--card-bg); border: 1px solid var(--border); font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .city-item:hover { border-color: var(--accent); color: var(--accent); }
    .city-item.selected { background: var(--accent); color: #000; border-color: var(--accent); }
    .subscribe-section { background: var(--card-bg); border-radius: 12px; padding: 16px; margin-top: 16px; border: 1px solid var(--border); }
    .subscribe-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .subscribe-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .sub-btn { padding: 10px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--card-bg); color: var(--text-primary); transition: all 0.2s; }
    .sub-btn:hover { border-color: var(--accent); color: var(--accent); }
    .sub-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }
    .week-view, .list-view { display: none; }
    .week-view.active, .list-view.active { display: block; }
    .week-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .week-date { width: 50px; text-align: center; }
    .week-day-num { font-size: 20px; font-weight: 700; color: var(--text-secondary); }
    .week-day-num.today { color: var(--accent); }
    .week-day-name { font-size: 12px; color: var(--text-secondary); }
    .week-events { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .week-event { padding: 4px 8px; border-radius: 4px; font-size: 12px; background: rgba(245,197,24,0.1); color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-item { display: flex; align-items: center; padding: 12px; background: var(--card-bg); border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; }
    .list-item:hover { transform: translateX(4px); }
    .list-date { width: 60px; text-align: center; padding-right: 12px; }
    .list-date-num { font-size: 24px; font-weight: 700; color: var(--text-secondary); }
    .list-date-month { font-size: 12px; color: var(--text-secondary); }
    .list-content { flex: 1; }
    .list-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .list-info { font-size: 12px; color: var(--text-secondary); }
    .ai-section { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .ai-icon { font-size: 20px; }
    .ai-title { font-size: 14px; font-weight: 600; }
    .ai-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .ai-tag { padding: 6px 12px; border-radius: 16px; font-size: 12px; background: rgba(255,255,255,0.2); cursor: pointer; transition: all 0.2s; }
    .ai-tag:hover { background: rgba(255,255,255,0.3); }
    @media (max-width: 400px) { .container { padding: 0 12px; } .header h1 { font-size: 16px; } }
  </style>
</head>
<body>
  <div class="container" id="mainPage">
    <header class="header">
      <a href="index.html" class="back-link">← 返回</a>
      <h1>🌍 全球大事件日历</h1>
      <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
    </header>

    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索事件...">
    </div>

    <div class="quick-stats">
      <div class="stat-card" onclick="showToday()" id="todayStat">
        <div class="stat-num" id="todayCount">0</div>
        <div class="stat-label">今日活动</div>
      </div>
      <div class="stat-card" onclick="showWeek()" id="weekStat">
        <div class="stat-num" id="weekCount">0</div>
        <div class="stat-label">本周活动</div>
      </div>
      <div class="stat-card" onclick="showUpcoming()" id="upcomingStat">
        <div class="stat-num" id="upcomingCount">0</div>
        <div class="stat-label">即将开始</div>
      </div>
    </div>

    <div class="ai-section">
      <div class="ai-header">
        <span class="ai-icon">🤖</span>
        <span class="ai-title">为你推荐</span>
      </div>
      <div class="ai-tags" id="aiRecommendations"></div>
    </div>

    <div class="view-switch">
      <button class="view-btn active" onclick="switchView('month')" id="monthViewBtn">月</button>
      <button class="view-btn" onclick="switchView('week')" id="weekViewBtn">周</button>
      <button class="view-btn" onclick="switchView('list')" id="listViewBtn">列表</button>
    </div>

    <div class="location-selector">
      <button class="location-btn active" onclick="showCitySelect('province')" id="cityBtn">
        <span>📍</span>
        <span id="cityText">浙江</span>
      </button>
      <button class="location-btn" onclick="showCitySelect('city')" id="cityBtn2">
        <span>🏙️</span>
        <span id="cityText2">杭州</span>
      </button>
      <button class="location-btn" onclick="requestLocation()">🎯 GPS定位</button>
    </div>

    <div class="filter-section">
      <div class="filter-label">📂 事件分类</div>
      <div class="filter-tabs">
        <div class="filter-tab active" data-category="all">全部</div>
        <div class="filter-tab" data-category="entertainment">🎭 娱乐</div>
        <div class="filter-tab" data-category="education">📚 教育</div>
        <div class="filter-tab" data-category="tech">💻 科技</div>
        <div class="filter-tab" data-category="sports">🏆 体育</div>
        <div class="filter-tab" data-category="culture">🏛️ 文化</div>
        <div class="filter-tab" data-category="business">💼 商业</div>
        <div class="filter-tab" data-category="festival">🎌 节日</div>
      </div>
    </div>

    <div class="sub-filter-section">
      <div class="filter-label">📋 具体类型</div>
      <div class="sub-filter-tabs" id="subFilterTabs">
        <div class="sub-filter-tab active" data-type="all">全部</div>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">📍 地理范围</div>
      <div class="filter-tabs">
        <div class="filter-tab active" data-scope="all">🌍 全部</div>
        <div class="filter-tab" data-scope="city">🏙️ 本市</div>
        <div class="filter-tab" data-scope="province">🏯 本省</div>
        <div class="filter-tab" data-scope="national">🇨🇳 全国</div>
        <div class="filter-tab" data-scope="global">🌐 全球</div>
      </div>
    </div>

    <div class="filter-section">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="sub-btn" onclick="showFavoritesPage()" style="flex:1;min-width:45%">
          ❤️ 收藏 (<span id="favCount">0</span>)
        </button>
        <button class="sub-btn" onclick="showSubscribeModal()" style="flex:1;min-width:45%">
          📅 订阅日历
        </button>
      </div>
    </div>

    <div class="month-nav">
      <button class="month-nav-btn" id="prevMonth">‹</button>
      <span class="month-title" id="monthTitle">2026年3月</span>
      <button class="month-nav-btn" id="nextMonth">›</button>
    </div>

    <div class="calendar" id="monthView">
      <div class="calendar-header">
        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="week-view" id="weekView"></div>
    <div class="list-view" id="listView"></div>

    <div class="event-section" id="eventSection">
      <div class="event-section-title" id="eventSectionTitle">今天的事件</div>
      <div class="event-list" id="eventList"></div>
    </div>
  </div>

  <div class="favorites-page" id="favoritesPage">
    <div class="page-header">
      <button class="page-back" onclick="hideFavoritesPage()">←</button>
      <span class="page-title">❤️ 我的收藏</span>
      <span class="page-count" id="favPageCount">0</span>
    </div>
    <div class="event-list" id="favoritesList"></div>
  </div>

  <div class="search-page" id="searchPage">
    <div class="page-header">
      <button class="page-back" onclick="hideSearchPage()">←</button>
      <span class="page-title">🔍 搜索结果</span>
      <span class="page-count" id="searchPageCount">0</span>
    </div>
    <div class="event-list" id="searchResults"></div>
  </div>

  <div class="upcoming-page" id="upcomingPage">
    <div class="page-header">
      <button class="page-back" onclick="hideUpcomingPage()">←</button>
      <span class="page-title">⏰ 即将开始</span>
      <span class="page-count" id="upcomingPageCount">0</span>
    </div>
    <div class="event-list" id="upcomingList"></div>
  </div>

  <div class="city-select-page" id="citySelectPage">
    <div class="page-header">
      <button class="page-back" onclick="hideCitySelect()">←</button>
      <span class="page-title" id="citySelectTitle">选择省份</span>
    </div>
    <div class="city-grid" id="cityGrid"></div>
  </div>

  <div class="modal-overlay" id="eventModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">事件详情</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <img class="modal-media" id="modalMedia" src="" alt="">
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <div class="modal-overlay" id="subscribeModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">📅 日历订阅</div>
        <button class="modal-close" onclick="closeSubscribeModal()">×</button>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary);margin-bottom:16px">将活动导入到你的日历应用，设置提醒</p>

      const totalCells = firstDay + daysInMonth;
      const remaining = totalCells > 35 ? 42 - totalCells : 35 - totalCells;
      for (let day = 1; day <= remaining; day++) {
        const el = document.createElement('div');
        el.className = 'calendar-day other-month';
        el.innerHTML = `<span class="day-num">${day}</span>`;
        grid.appendChild(el);
      }
    }

    // 渲染事件卡片
    function renderEventCard(event, index) {
      const color = typeColors[event.type] || '#888';
      const label = typeLabels[event.type] || event.type;
      const scope = scopeLabels[event.locationScope] || '';
      let dateDisplay = event.date;
      if (event.endDate && event.endDate !== event.date) dateDisplay = `${event.date} ~ ${event.endDate}`;
      const countdown = formatCountdown(event.date);
      const fav = isFavorite(event.id);
      const img = event.image ? `<img class="event-image" src="${event.image}" alt="${event.title}" onerror="this.style.display='none'">` : '';
      return `
        <div class="event-card" style="animation-delay:${index*0.05}s;border-left-color:${color}" onclick="openModal(${event.id})">
          ${img}
          <div class="event-tags">
            <div class="event-type" style="background:${color}22;color:${color}">${label}</div>
            <div class="location-scope">${scope}</div>
          </div>
          <div class="event-title">${event.title}<button class="favorite-btn" onclick="toggleFavorite(${event.id},event)">${fav ? '❤️' : '🤍'}</button></div>
          <div class="event-date">📅 ${dateDisplay} · ⏰ ${countdown}</div>
          <div class="event-location">📍 ${event.location}</div>
        </div>`;
    }

    // 详情弹窗
    function openModal(id) {
      const event = events.find(e => e.id === id);
      if (!event) return;
      const color = typeColors[event.type] || '#888';
      const label = typeLabels[event.type] || event.type;
      const scope = scopeLabels[event.locationScope] || '';
      let dateDisplay = event.date;
      if (event.endDate && event.endDate !== event.date) dateDisplay = `${event.date} ~ ${event.endDate}`;
      
      const img = event.image ? `<img class="modal-media" src="${event.image}" alt="${event.title}" onerror="this.style.display='none'">` : '';
      document.getElementById('modalMedia').outerHTML = img || '';
      document.getElementById('modalTitle').textContent = event.title;
      
      let bodyHtml = `
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
          <span style="background:${color}22;color:${color};padding:4px 10px;border-radius:12px;font-size:12px;font-weight:600">${label}</span>
          <span style="background:rgba(136,136,170,0.15);color:#8888aa;padding:4px 8px;border-radius:8px;font-size:11px">${scope}</span>
        </div>
        <div class="modal-meta">
          <div class="meta-item"><div class="meta-label">📅 时间</div><div class="meta-value">${dateDisplay}</div></div>
          <div class="meta-item"><div class="meta-label">⏰ 倒计时</div><div class="meta-value" style="color:var(--accent)">${formatCountdown(event.date)}</div></div>
          <div class="meta-item"><div class="meta-label">📍 地点</div><div class="meta-value">${event.location}</div></div>
          <div class="meta-item"><div class="meta-label">💰 票价</div><div class="meta-value">${event.price || '待定'}</div></div>
        </div>`;
      if (event.venue) bodyHtml += `<p>🏟️ <strong>场馆：</strong>${event.venue}</p>`;
      if (event.description) bodyHtml += `<p>📝 <strong>简介：</strong>${event.description}</p>`;
      if (event.organizer) bodyHtml += `<p>🏢 <strong>主办：</strong>${event.organizer}</p>`;
      if (event.tags) bodyHtml += `<div class="modal-tags">${event.tags.split(',').map(t => `<span class="modal-tag">#${t.trim()}</span>`).join('')}</div>`;
      bodyHtml += `<div class="reminder-section"><div class="reminder-title">🔔 提醒设置</div><div class="reminder-options"><span class="reminder-option ${reminders[id]==1?'selected':''}" onclick="setReminder(${id},1)">提前1天</span><span class="reminder-option ${reminders[id]==3?'selected':''}" onclick="setReminder(${id},3)">提前3天</span><span class="reminder-option ${reminders[id]==7?'selected':''}" onclick="setReminder(${id},7)">提前1周</span><span class="reminder-option ${!reminders[id]?'selected':''}" onclick="setReminder(${id},0)">不提醒</span></div></div>`;
      document.getElementById('modalBody').innerHTML = bodyHtml;
      
      let actionsHtml = '';
      if (event.ticketLink) actionsHtml += `<a href="${event.ticketLink}" target="_blank" class="modal-link primary">🎫 立即购票 →</a>`;
      if (event.link) actionsHtml += `<a href="${event.link}" target="_blank" class="modal-link secondary">🔗 官方网站 →</a>`;
      actionsHtml += `<button class="modal-link secondary" onclick="downloadEventICS(${id})">📅 添加到日历</button>`;
      actionsHtml += `<button class="modal-link secondary" onclick="toggleFavorite(${id},event);closeModal();">${isFavorite(id) ? '💔 取消收藏' : '❤️ 收藏活动'}</button>`;
      document.getElementById('modalActions').innerHTML = actionsHtml;
      
      document.getElementById('eventModal').classList.add('active');
    }

    function setReminder(id, days) {
      if (days === 0) delete reminders[id];
      else reminders[id] = days;
      localStorage.setItem('eventReminders', JSON.stringify(reminders));
      document.querySelectorAll('.reminder-option').forEach((el, i) => {
        const dayMap = [1, 3, 7, 0];
        el.classList.toggle('selected', dayMap[i] === days);
      });
    }

    function closeModal() { document.getElementById('eventModal').classList.remove('active'); }
    document.getElementById('eventModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

    function renderEvents() {
      updateFavCount();
      if (!selectedDate) {
        document.getElementById('eventList').innerHTML = '<div class="no-events"><div class="no-events-icon">📅</div><p>点击日历中的日期查看事件</p></div>';
        document.getElementById('eventSectionTitle').textContent = '事件列表';
        return;
      }
      const dateKey = formatDateKey(currentYear, currentMonth, selectedDate);
      const eventsForDay = getEventsForDate(dateKey);
      document.getElementById('eventSectionTitle').textContent = `${currentYear}年${monthNames[currentMonth]}${selectedDate}日`;
      document.getElementById('eventList').innerHTML = eventsForDay.length ? eventsForDay.map((e, i) => renderEventCard(e, i)).join('') : '<div class="no-events"><div class="no-events-icon">🎉</div><p>这一天没有重大事件</p></div>';
    }

    // 订阅
    function showSubscribeModal() { document.getElementById('subscribeModal').classList.add('active'); }
    function closeSubscribeModal() { document.getElementById('subscribeModal').classList.remove('active'); }
    document.getElementById('subscribeModal').addEventListener('click', function(e) { if (e.target === this) closeSubscribeModal(); });

    function downloadICS() {
      const cal = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//全球大事件日历//CN'];
      events.filter(e => eventMatchesFilters(e)).forEach(e => {
        const start = e.date.replace(/-/g,'');
        const end = (e.endDate || e.date).replace(/-/g,'');
        const reminder = reminders[e.id];
        cal.push('BEGIN:VEVENT');
        cal.push(`DTSTART:${start}`);
        cal.push(`DTEND:${end}`);
        cal.push(`SUMMARY:${e.title}`);
        cal.push(`LOCATION:${e.location}${e.venue ? ' - ' + e.venue : ''}`);
        cal.push(`DESCRIPTION:${e.description || ''}`);
        if (e.link) cal.push(`URL:${e.link}`);
        if (reminder) {
          cal.push(`BEGIN:VALARM`);
          cal.push(`TRIGGER:-P${reminder}D`);
          cal.push(`ACTION:DISPLAY`);
          cal.push(`DESCRIPTION:${e.title}提醒`);
          cal.push(`END:VALARM`);
        }
        cal.push('END:VEVENT');
      });
      cal.push('END:VCALENDAR');
      const blob = new Blob([cal.join('\r\n')], {type: 'text/calendar'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'events.ics';
      a.click();
      alert('已下载 events.ics 文件，可以导入到日历应用了！');
    }

    function downloadEventICS(id) {
      const e = events.find(ev => ev.id === id);
      if (!e) return;
      const cal = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//全球大事件日历//CN'];
      const start = e.date.replace(/-/g,'');
      const end = (e.endDate || e.date).replace(/-/g,'');
      const reminder = reminders[e.id];
      cal.push('BEGIN:VEVENT');
      cal.push(`DTSTART:${start}`);
      cal.push(`DTEND:${end}`);
      cal.push(`SUMMARY:${e.title}`);
      cal.push(`LOCATION:${e.location}${e.venue ? ' - ' + e.venue : ''}`);
      cal.push(`DESCRIPTION:${e.description || ''}`);
      if (e.link) cal.push(`URL:${e.link}`);
      if (reminder) {
        cal.push(`BEGIN:VALARM`);
        cal.push(`TRIGGER:-P${reminder}D`);
        cal.push(`ACTION:DISPLAY`);
        cal.push(`DESCRIPTION:${e.title}提醒`);
        cal.push(`END:VALARM`);
      }
      cal.push('END:VEVENT');
      cal.push('END:VCALENDAR');
      const blob = new Blob([cal.join('\r\n')], {type: 'text/calendar'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${e.title}.ics`;
      a.click();
    }

    function copyCalendarUrl() { navigator.clipboard?.writeText(window.location.href); alert('链接已复制！'); }

    // 分类筛选
    document.querySelectorAll('[data-category]').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('[data-category]').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentCategory = tab.dataset.category;
        currentType = 'all';
        updateSubFilters();
        renderCalendar();
        renderEvents();
        updateQuickStats();
      });
    });

    function updateSubFilters() {
      const container = document.getElementById('subFilterTabs');
      const types = currentCategory === 'all' ? [] : (categoryTypes[currentCategory] || []);
      let html = '<div class="sub-filter-tab active" data-type="all">全部</div>';
      types.forEach(t => { html += `<div class="sub-filter-tab" data-type="${t}">${typeLabels[t] || t}</div>`; });
      container.innerHTML = html;
      container.querySelectorAll('[data-type]').forEach(tab => {
        tab.addEventListener('click', () => {
          container.querySelectorAll('[data-type]').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentType = tab.dataset.type;
          renderCalendar();
          renderEvents();
        });
      });
    }

    document.querySelectorAll('[data-scope]').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('[data-scope]').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentScope = tab.dataset.scope;
        renderCalendar();
        renderEvents();
        updateQuickStats();
      });
    });

    document.getElementById('prevMonth').addEventListener('click', () => { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar(); renderEvents(); });
    document.getElementById('nextMonth').addEventListener('click', () => { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); renderEvents(); });

    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    if (localStorage.getItem('calendarTheme') === 'light') { document.body.classList.add('light'); document.getElementById('themeToggle').textContent = '☀️'; }

    updateSubFilters();
    renderCalendar();
    renderEvents();
    updateQuickStats();
    renderAIRecommendations();
  </script>
</body>
</html>
