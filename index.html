<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杭州天气</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@400;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #080c14;
      --bg-secondary: #0f1623;
      --bg-card: rgba(20, 30, 50, 0.6);
      --accent-cyan: #7dd3fc;
      --accent-amber: #fbbf24;
      --accent-green: #34d399;
      --accent-red: #f87171;
      --accent-purple: #a78bfa;
      --text-primary: #f1f5f9;
      --text-secondary: #64748b;
      --text-muted: #334155;
      --border: rgba(125, 211, 252, 0.1);
      --glow: rgba(125, 211, 252, 0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--bg-primary);
      font-family: 'DM Sans', 'Noto Sans SC', sans-serif;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* Background */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(125,211,252,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(167,139,250,0.04) 0%, transparent 60%),
        linear-gradient(180deg, #080c14 0%, #0f1623 50%, #080c14 100%);
      z-index: 0;
    }

    .rain-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .rain-drop {
      position: absolute;
      width: 1.5px;
      height: 18px;
      background: linear-gradient(to bottom, transparent, rgba(125,211,252,0.35));
      border-radius: 0 0 2px 2px;
      animation: rain-fall linear infinite;
    }

    @keyframes rain-fall {
      0% { transform: translateY(-60px) rotate(12deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.8; }
      100% { transform: translateY(100vh) rotate(12deg); opacity: 0; }
    }

    /* Main */
    .main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 32px 16px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 28px;
      animation: fadeDown 0.7s ease;
    }

    .header h1 {
      font-family: 'Playfair Display', 'Noto Sans SC', serif;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .header .coords {
      color: var(--text-secondary);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
    }

    @keyframes fadeDown {
      0% { opacity: 0; transform: translateY(-16px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(24px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(15,22,35,0.8);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 24px;
      animation: fadeUp 0.7s ease 0.1s backwards;
    }

    .tab-btn {
      padding: 8px 22px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .tab-btn:hover {
      color: var(--text-primary);
      background: rgba(125,211,252,0.06);
    }

    .tab-btn.active {
      background: rgba(125,211,252,0.15);
      color: var(--accent-cyan);
    }

    /* Card */
    .card {
      width: 100%;
      max-width: 500px;
      background: var(--bg-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 36px 32px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.8s ease 0.15s backwards;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .card::before {
      content: '';
      position: absolute;
      top: -80px;
      left: -80px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Loading */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      gap: 16px;
      color: var(--text-secondary);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(125,211,252,0.1);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Today hero */
    .today-hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .today-hero .date-row {
      font-size: 0.78rem;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }

    .weather-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 16px;
      animation: iconFloat 5s ease-in-out infinite;
    }

    .weather-icon svg { width: 100%; height: 100%; }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .temp-display {
      font-family: 'Playfair Display', serif;
      font-size: 4.8rem;
      font-weight: 400;
      line-height: 1;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .temp-display span { font-size: 2rem; opacity: 0.5; }

    .weather-desc {
      font-size: 1.15rem;
      color: var(--accent-cyan);
      margin-bottom: 4px;
    }

    .feels-like {
      color: var(--text-secondary);
      font-size: 0.88rem;
    }

    .feels-like span { color: #94a3b8; }

    /* AQI Section */
    .aqi-section {
      background: rgba(0,0,0,0.2);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .aqi-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .aqi-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.06em;
    }

    .aqi-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .aqi-badge.excellent { background: rgba(52,211,153,0.15); color: var(--accent-green); }
    .aqi-badge.good { background: rgba(125,211,252,0.15); color: var(--accent-cyan); }
    .aqi-badge.moderate { background: rgba(251,191,36,0.15); color: var(--accent-amber); }
    .aqi-badge.poor { background: rgba(248,113,113,0.15); color: var(--accent-red); }

    .aqi-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .aqi-aqi {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .aqi-pollutants {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .pollutant {
      text-align: center;
      padding: 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
    }

    .pollutant .val {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .pollutant .label {
      font-size: 0.68rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Details grid */
    .details-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 28px;
    }

    .detail-item {
      text-align: center;
    }

    .detail-icon {
      width: 28px; height: 28px;
      margin: 0 auto 8px;
      opacity: 0.6;
    }

    .detail-val {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .detail-label {
      font-size: 0.68rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Sun times */
    .sun-times {
      display: flex;
      justify-content: space-around;
      padding: 20px 0 4px;
      border-top: 1px solid rgba(125,211,252,0.08);
    }

    .sun-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sun-icon { width: 22px; height: 22px; }

    .sun-item .time-val { font-size: 0.95rem; font-weight: 500; }
    .sun-item .time-label { font-size: 0.68rem; color: var(--text-secondary); }

    /* Weekly forecast */
    .forecast-header {
      font-size: 0.78rem;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
      text-align: center;
    }

    .forecast-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .forecast-row {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-radius: 14px;
      transition: background 0.2s;
    }

    .forecast-row:hover { background: rgba(125,211,252,0.04); }

    .forecast-row .day {
      width: 80px;
      font-size: 0.88rem;
      font-weight: 500;
    }

    .forecast-row .day .sub {
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .forecast-row .icon {
      width: 36px; height: 36px;
      margin-right: 12px;
    }

    .forecast-row .icon svg { width: 100%; height: 100%; }

    .forecast-row .desc {
      flex: 1;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .forecast-row .hi { font-size: 0.95rem; font-weight: 600; margin-right: 16px; }
    .forecast-row .lo { font-size: 0.85rem; color: var(--text-secondary); }

    .forecast-row .rain-chance {
      font-size: 0.75rem;
      color: var(--accent-cyan);
      opacity: 0.8;
      margin-left: 12px;
    }

    /* Monthly overview */
    .monthly-overview {
      margin-bottom: 24px;
      padding: 20px;
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
    }

    .monthly-stat {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .stat-card {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .stat-card .val {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-card .label {
      font-size: 0.72rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-card.highlight .val { color: #f87171; }
    .stat-card.low .val { color: #7dd3fc; }

    .monthly-temp-bar {
      margin-top: 20px;
    }

    .temp-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .temp-bar-track {
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(90deg, #7dd3fc 0%, #a78bfa 50%, #f87171 100%);
      opacity: 0.3;
    }

    .temp-bar-marker {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .temp-bar-marker span {
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    .temp-bar-marker .pos {
      font-weight: 600;
      color: var(--accent-amber);
    }

    /* Error */
    .error-state {
      text-align: center;
      padding: 40px;
      color: var(--accent-red);
    }

    .retry-btn {
      margin-top: 16px;
      padding: 10px 24px;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px;
      color: var(--accent-red);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
    }

    /* Footer */
    .footer {
      margin-top: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.75rem;
      animation: fadeUp 0.7s ease 0.3s backwards;
    }

    /* Mobile */
    @media (max-width: 480px) {
      .card { padding: 28px 20px; border-radius: 22px; }
      .temp-display { font-size: 4rem; }
      .tabs { gap: 2px; padding: 3px; }
      .tab-btn { padding: 7px 16px; font-size: 0.82rem; }
      .aqi-pollutants { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .details-grid { grid-template-columns: repeat(3, 1fr); gap: 14px; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="rain-container" id="rain"></div>

  <div class="main">
    <div class="header">
      <h1>杭州</h1>
      <div class="coords">东经 120.17° · 北纬 30.25°</div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="today">今日</button>
      <button class="tab-btn" data-tab="week">一周</button>
      <button class="tab-btn" data-tab="month">月报</button>
    </div>

    <div class="card">
      <div id="tab-today" class="tab-panel active">
        <div class="today-hero">
          <div class="date-row" id="today-date"></div>
          <div class="weather-icon" id="today-icon"></div>
          <div class="temp-display" id="today-temp">--<span>°C</span></div>
          <div class="weather-desc" id="today-desc">加载中...</div>
          <div class="feels-like">体感 <span id="today-feels">--°C</span></div>
        </div>

        <!-- AQI -->
        <div class="aqi-section">
          <div class="aqi-header">
            <div class="aqi-title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
              空气质量 AQI
            </div>
            <div class="aqi-badge good" id="aqi-badge">
              <span class="aqi-dot"></span>
              <span id="aqi-level">--</span>
            </div>
          </div>
          <div class="aqi-aqi" id="aqi-value">--</div>
          <div class="aqi-pollutants">
            <div class="pollutant">
              <div class="val" id="pm25-val">--</div>
              <div class="label">PM2.5</div>
            </div>
            <div class="pollutant">
              <div class="val" id="pm10-val">--</div>
              <div class="label">PM10</div>
            </div>
            <div class="pollutant">
              <div class="val" id="o3-val">--</div>
              <div class="label">O₃</div>
            </div>
          </div>
        </div>

        <div class="details-grid">
          <div class="detail-item">
            <div class="detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2">
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                <circle cx="12" cy="12" r="4"/>
              </svg>
            </div>
            <div class="detail-val" id="detail-humidity">--%</div>
            <div class="detail-label">湿度</div>
          </div>
          <div class="detail-item">
            <div class="detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2">
                <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
              </svg>
            </div>
            <div class="detail-val" id="detail-wind">-- km/h</div>
            <div class="detail-label">风速</div>
          </div>
          <div class="detail-item">
            <div class="detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2">
                <path d="M12 2a5 5 0 0 1 5 5c0 5-5 10-5 10S7 12 7 7a5 5 0 0 1 5-5z"/>
              </svg>
            </div>
            <div class="detail-val" id="detail-vis">-- km</div>
            <div class="detail-label">能见度</div>
          </div>
          <div class="detail-item">
            <div class="detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
              </svg>
            </div>
            <div class="detail-val" id="detail-pressure">----</div>
            <div class="detail-label">气压 hPa</div>
          </div>
          <div class="detail-item">
            <div class="detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
              </svg>
            </div>
            <div class="detail-val" id="detail-uv">--</div>
            <div class="detail-label">UV指数</div>
          </div>
          <div class="detail-item">
            <div class="detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2">
                <path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/>
              </svg>
            </div>
            <div class="detail-val" id="detail-cloud">--%</div>
            <div class="detail-label">云量</div>
          </div>
        </div>

        <div class="sun-times">
          <div class="sun-item">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2">
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
            </svg>
            <div>
              <div class="time-val" id="sunrise">--:--</div>
              <div class="time-label">日出</div>
            </div>
          </div>
          <div class="sun-item">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <div>
              <div class="time-val" id="sunset">--:--</div>
              <div class="time-label">日落</div>
            </div>
          </div>
        </div>
      </div>

      <div id="tab-week" class="tab-panel">
        <div class="forecast-header">未来三天预报</div>
        <div class="forecast-list" id="week-forecast">
          <div class="loading">
            <div class="spinner"></div>
            <span>加载中...</span>
          </div>
        </div>
      </div>

      <div id="tab-month" class="tab-panel">
        <div class="forecast-header">本月天气总览</div>
        <div class="monthly-overview">
          <div class="monthly-stat" id="month-stats">
            <div class="stat-card highlight">
              <div class="val" id="month-hi">--°</div>
              <div class="label">本月最高</div>
            </div>
            <div class="stat-card low">
              <div class="val" id="month-lo">--°</div>
              <div class="label">本月最低</div>
            </div>
            <div class="stat-card">
              <div class="val" id="month-rain">--</div>
              <div class="label">降雨天数</div>
            </div>
            <div class="stat-card">
              <div class="val" id="month-sunny">--</div>
              <div class="label">晴天数</div>
            </div>
          </div>
          <div class="monthly-temp-bar">
            <div class="temp-bar-labels">
              <span>寒冷</span>
              <span>凉爽</span>
              <span>温暖</span>
              <span>炎热</span>
            </div>
            <div class="temp-bar-track"></div>
            <div class="temp-bar-marker">
              <span>当前温度：</span>
              <span class="pos" id="month-current-temp">--°C</span>
            </div>
          </div>
        </div>
        <div class="forecast-list" id="month-forecast">
          <div class="loading">
            <div class="spinner"></div>
            <span>加载中...</span>
          </div>
        </div>
      </div>
    </div>

    <div class="footer" id="footer">
      打开页面时自动获取最新数据
    </div>
  </div>

  <script>
    // Weather icons
    const ICONS = {
      '113': `<svg viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="22" fill="#fbbf24"/><path d="M50 20v8M50 72v8M20 50h8M72 50h8M28 28l6 6M66 66l6 6M28 72l6-6M66 34l6-6" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/></svg>`,
      '116': `<svg viewBox="0 0 100 100" fill="none"><circle cx="40" cy="35" r="14" fill="#fcd34d" opacity="0.9"/><path d="M65 55c0-11-9-20-20-20-1.5 0-3 .2-4.5.5C37 22.5 27.5 17 16 17c-14.4 0-26 11.6-26 26 0 1.2.1 2.4.2 3.6C-4.8 47.5 0 53 6 55h59z" fill="#94a3b8"/></svg>`,
      '296': `<svg viewBox="0 0 100 100" fill="none"><path d="M75 55c0-11-9-20-20-20-1.5 0-3 .2-4.5.5C47 22.5 37.5 17 26 17c-14.4 0-26 11.6-26 26 0 1.2.1 2.4.2 3.6C5.2 47.5 10 53 16 55h59z" fill="#64748b" opacity="0.9"/><path d="M25 62l-3 15M35 62l-2.5 12M45 62l-3 15M55 62l-2.5 12M65 62l-3 15" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round" opacity="0.7"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" repeatCount="indefinite"/></path></svg>`,
      '266': `<svg viewBox="0 0 100 100" fill="none"><path d="M75 55c0-11-9-20-20-20-1.5 0-3 .2-4.5.5C47 22.5 37.5 17 26 17c-14.4 0-26 11.6-26 26 0 1.2.1 2.4.2 3.6C5.2 47.5 10 53 16 55h59z" fill="#64748b" opacity="0.9"/><path d="M30 62v12M40 62v8M50 62v12M60 62v8" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" opacity="0.5"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/></path></svg>`,
      '119': `<svg viewBox="0 0 100 100" fill="none"><path d="M20 70a30 30 0 1 0 60 0 25 25 0 1 0-50 0 20 20 0 1 0 40 0 15 15 0 1 0 30 0" fill="#94a3b8" opacity="0.4"/><path d="M75 55c0-11-9-20-20-20-1.5 0-3 .2-4.5.5C47 22.5 37.5 17 26 17c-14.4 0-26 11.6-26 26 0 1.2.1 2.4.2 3.6C5.2 47.5 10 53 16 55h59z" fill="#64748b"/></svg>`,
      '122': `<svg viewBox="0 0 100 100" fill="none"><path d="M75 55c0-11-9-20-20-20-1.5 0-3 .2-4.5.5C47 22.5 37.5 17 26 17c-14.4 0-26 11.6-26 26 0 1.2.1 2.4.2 3.6C5.2 47.5 10 53 16 55h59z" fill="#475569"/></svg>`,
    };

    const SMALL_ICONS = {
      '113': `<svg viewBox="0 0 50 50" fill="none"><circle cx="25" cy="25" r="10" fill="#fbbf24"/><path d="M25 10v4M25 36v4M10 25h4M36 25h4M14 14l3 3M33 33l3 3M14 36l3-3M33 17l3-3" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/></svg>`,
      '116': `<svg viewBox="0 0 50 50" fill="none"><circle cx="18" cy="16" r="6" fill="#fcd34d"/>          <path d="M36 30c0-6-5-11-11-11-1 0-2 .1-2.5.3C20 13.5 13 11 7 11c-8 0-14 6.5-14 14 0 .7.1 1.3.1 2C-3 27.5 0 31 3 33h33z" fill="#94a3b8"/></svg>`,
      '296': `<svg viewBox="0 0 50 50" fill="none"><path d="M36 30c0-6-5-11-11-11-1 0-2 .1-2.5.3C20 13.5 13 11 7 11c-8 0-14 6.5-14 14 0 .7.1 1.3.1 2C-3 27.5 0 31 3 33h33z" fill="#64748b" opacity="0.9"/><path d="M12 37l-1.5 8M18 37l-1 6M24 37l-1.5 8M30 37l-1 6M36 37l-1.5 8" stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round" opacity="0.7"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" repeatCount="indefinite"/></path></svg>`,
      '266': `<svg viewBox="0 0 50 50" fill="none"><path d="M36 30c0-6-5-11-11-11-1 0-2 .1-2.5.3C20 13.5 13 11 7 11c-8 0-14 6.5-14 14 0 .7.1 1.3.1 2C-3 27.5 0 31 3 33h33z" fill="#64748b" opacity="0.9"/><path d="M14 37v7M20 37v5M26 37v7M32 37v5" stroke="#7dd3fc" stroke-width="1.2" stroke-linecap="round" opacity="0.5"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/></path></svg>`,
      '119': `<svg viewBox="0 0 50 50" fill="none"><path d="M10 40a15 15 0 1 0 30 0 12 12 0 1 0-25 0 9 9 0 1 0 20 0 6 6 0 1 0 15 0" fill="#94a3b8" opacity="0.4"/></svg>`,
      '122': `<svg viewBox="0 0 50 50" fill="none"><path d="M36 30c0-6-5-11-11-11-1 0-2 .1-2.5.3C20 13.5 13 11 7 11c-8 0-14 6.5-14 14 0 .7.1 1.3.1 2C-3 27.5 0 31 3 33h33z" fill="#475569"/></svg>`,
    };

    const WEEKDAY = ['周日','周一','周二','周三','周四','周五','周六'];
    const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

    function getIcon(code) {
      return ICONS[code] || ICONS['116'];
    }

    function getSmallIcon(code) {
      return SMALL_ICONS[code] || SMALL_ICONS['116'];
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return `${d.getMonth()+1}月${d.getDate()}日`;
    }

    function formatDay(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      const today = new Date();
      today.setHours(12,0,0,0);
      const diff = Math.round((d - today) / 86400000);
      if (diff === 0) return '今天';
      if (diff === 1) return '明天';
      if (diff === 2) return '后天';
      return WEEKDAY[d.getDay()];
    }

    function getAqiLevel(aqi) {
      if (aqi <= 50)  return { label: '优', cls: 'excellent' };
      if (aqi <= 100) return { label: '良', cls: 'good' };
      if (aqi <= 150) return { label: '轻度', cls: 'moderate' };
      return { label: '中度', cls: 'poor' };
    }

    function createRain() {
      const c = document.getElementById('rain');
      for (let i = 0; i < 40; i++) {
        const d = document.createElement('div');
        d.className = 'rain-drop';
        d.style.left = Math.random() * 100 + '%';
        d.style.animationDuration = (Math.random() * 1 + 0.7) + 's';
        d.style.animationDelay = Math.random() * 3 + 's';
        d.style.opacity = Math.random() * 0.4 + 0.1;
        c.appendChild(d);
      }
    }

    function animateTemp(el, target) {
      const dur = 1200;
      const st = performance.now();
      function upd(t) {
        const p = Math.min((t - st) / dur, 1);
        const e = 1 - Math.pow(1 - p, 3);
        el.innerHTML = Math.round(target * e) + '<span>°C</span>';
        if (p < 1) requestAnimationFrame(upd);
      }
      requestAnimationFrame(upd);
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // Fetch weather
    async function fetchWeather() {
      try {
        const [wRes, aqiRes] = await Promise.all([
          fetch('https://wttr.in/Hangzhou?format=j1'),
          fetch('https://api.waqi.info/feed/hangzhou/?token=demo')
        ]);
        const w = await wRes.json();
        const aqiData = await aqiRes.json();

        const cur = w.current_condition[0];
        const astro = w.weather[0].astronomy[0];
        const todayWeather = w.weather[0];

        // Today
        const now = new Date();
        document.getElementById('today-date').textContent =
          now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 ' + WEEKDAY[now.getDay()];

        document.getElementById('today-icon').innerHTML = getIcon(cur.weatherCode);
        animateTemp(document.getElementById('today-temp'), parseInt(cur.temp_C));
        document.getElementById('today-desc').textContent = cur.weatherDesc[0].value;
        document.getElementById('today-feels').textContent = cur.FeelsLikeC + '°C';

        // AQI
        const aqi = aqiData.data ? aqiData.data.aqi : null;
        if (aqi !== null) {
          const level = getAqiLevel(aqi);
          document.getElementById('aqi-value').textContent = aqi;
          document.getElementById('aqi-level').textContent = level.label;
          document.getElementById('aqi-badge').className = 'aqi-badge ' + level.cls;

          const iaqi = aqiData.data.iaqi || {};
          document.getElementById('pm25-val').textContent = iaqi.pm25 ? Math.round(iaqi.pm25.v) : '--';
          document.getElementById('pm10-val').textContent = iaqi.pm10 ? Math.round(iaqi.pm10.v) : '--';
          document.getElementById('o3-val').textContent  = iaqi.o3  ? Math.round(iaqi.o3.v)  : '--';
        } else {
          document.getElementById('aqi-badge').innerHTML = '<span class="aqi-dot"></span><span>暂无数据</span>';
        }

        // Details
        document.getElementById('detail-humidity').textContent = cur.humidity + '%';
        document.getElementById('detail-wind').textContent = cur.windspeedKmph + ' km/h';
        document.getElementById('detail-vis').textContent = cur.visibility + ' km';
        document.getElementById('detail-pressure').textContent = cur.pressure;
        document.getElementById('detail-uv').textContent = cur.uvIndex;
        document.getElementById('detail-cloud').textContent = cur.cloudcover + '%';

        // Sun
        document.getElementById('sunrise').textContent = astro.sunrise;
        document.getElementById('sunset').textContent = astro.sunset;

        // Weekly forecast (next 3 days)
        const weekDays = w.weather.slice(0, 4);
        let weekHtml = '';
        weekDays.forEach((day, i) => {
          const a = day.astronomy[0];
          const high = Math.round((parseInt(day.maxtempC) + parseInt(day.mintempC)) / 2 + 3);
          const low  = Math.round((parseInt(day.maxtempC) + parseInt(day.mintempC)) / 2 - 3);
          const rainChance = day.hourly.reduce((max, h) => Math.max(max, parseInt(h.chanceofrain || 0)), 0);
          weekHtml += `
            <div class="forecast-row">
              <div class="day">${formatDay(day.date)}<div class="sub">${formatDate(day.date)}</div></div>
              <div class="icon">${getSmallIcon(day.hourly[4] ? day.hourly[4].weatherCode : '116')}</div>
              <div class="desc">${day.hourly[4] ? day.hourly[4].weatherDesc[0].value : ''}</div>
              <div class="hi">${day.maxtempC}°</div>
              <div class="lo">${day.mintempC}°</div>
              ${rainChance > 10 ? `<div class="rain-chance">🌧${rainChance}%</div>` : ''}
            </div>`;
        });
        document.getElementById('week-forecast').innerHTML = weekHtml;

        // Monthly stats (approximate from weekly data)
        const allDays = w.weather;
        const maxTemp = Math.max(...allDays.map(d => parseInt(d.maxtempC)));
        const minTemp = Math.min(...allDays.map(d => parseInt(d.mintempC)));
        document.getElementById('month-hi').textContent = maxTemp + '°';
        document.getElementById('month-lo').textContent = minTemp + '°';
        document.getElementById('month-current-temp').textContent = cur.temp_C + '°C';

        const rainDays = allDays.filter(d => parseInt(d.hourly[4]?.chanceofrain || 0) > 30).length;
        document.getElementById('month-rain').textContent = rainDays + '天';
        document.getElementById('month-sunny').textContent = Math.max(0, allDays.length - rainDays) + '天';

        // Month forecast rows
        let monthHtml = '';
        allDays.forEach((day, i) => {
          const rainChance = day.hourly.reduce((max, h) => Math.max(max, parseInt(h.chanceofrain || 0)), 0);
          const desc = day.hourly[4] ? day.hourly[4].weatherDesc[0].value : '';
          monthHtml += `
            <div class="forecast-row">
              <div class="day">${formatDay(day.date)}<div class="sub">${formatDate(day.date)}</div></div>
              <div class="icon">${getSmallIcon(day.hourly[4] ? day.hourly[4].weatherCode : '116')}</div>
              <div class="desc">${desc}</div>
              <div class="hi">${day.maxtempC}°</div>
              <div class="lo">${day.mintempC}°</div>
              ${rainChance > 10 ? `<div class="rain-chance">🌧${rainChance}%</div>` : ''}
            </div>`;
        });
        document.getElementById('month-forecast').innerHTML = monthHtml;

        // Footer
        document.getElementById('footer').textContent =
          '天气 wttr.in · 空气质量 waqi.info · ' + now.toLocaleString('zh-CN');

      } catch (err) {
        console.error(err);
        ['week-forecast','month-forecast'].forEach(id => {
          document.getElementById(id).innerHTML = '<div class="error-state">数据加载失败，请检查网络</div>';
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      createRain();
      fetchWeather();
    });
  </script>
</body>
</html>
